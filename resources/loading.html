<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>钉哥联盟 AI 智盘 - 启动中</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: radial-gradient(circle at center, #0a0f1d 0%, #05070f 100%);
  color: #e2e8f0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  -webkit-app-region: drag;
}

.container {
  text-align: center;
  -webkit-app-region: no-drag;
  position: relative;
  z-index: 10;
}

/* Background glowing effect */
.glow-backdrop {
  position: absolute;
  width: 350px;
  height: 350px;
  background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, rgba(56, 189, 248, 0.03) 50%, transparent 70%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 1;
  pointer-events: none;
}

.logo-wrap {
  position: relative;
  width: 140px;
  height: 140px;
  margin: 0 auto 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: floatPlatter 6s ease-in-out infinite;
}

@keyframes floatPlatter {
  0%, 100% { transform: translateY(0) rotate(0deg); filter: drop-shadow(0 10px 25px rgba(99, 102, 241, 0.25)); }
  50% { transform: translateY(-8px) rotate(180deg); filter: drop-shadow(0 18px 35px rgba(56, 189, 248, 0.4)); }
}

h1 {
  font-size: 2.2em;
  margin-bottom: 8px;
  font-weight: 700;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

h1 span {
  background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 900;
}

.subtitle {
  color: #64748b;
  font-size: 1.05em;
  margin-bottom: 36px;
  letter-spacing: 0.05em;
  font-weight: 500;
}

/* Elegant Progress Bar */
.loader-wrap {
  position: relative;
  width: 240px;
  height: 4px;
  background: rgba(255, 255, 255, 0.03);
  border-radius: 99px;
  margin: 0 auto 20px;
  overflow: hidden;
  border: 1px solid rgba(255, 255, 255, 0.05);
}

.loader-bar {
  height: 100%;
  width: 50%;
  background: linear-gradient(90deg, #38bdf8, #818cf8);
  border-radius: 99px;
  box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
  animation: loading 1.8s cubic-bezier(0.65, 0.05, 0.36, 1) infinite;
}

@keyframes loading {
  0% { transform: translateX(-120%); }
  100% { transform: translateX(240%); }
}

.status {
  color: #94a3b8;
  font-size: 0.88em;
  font-weight: 400;
}
</style>
</head>
<body>
<div class="glow-backdrop"></div>
<div class="container">
  <div class="logo-wrap">
    <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" style="width: 100%; height: 100%;">
      <defs>
        <linearGradient id="lubanDiskGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#38bdf8" />
          <stop offset="50%" stop-color="#6366f1" />
          <stop offset="100%" stop-color="#a855f7" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="6" result="blur" />
          <feMerge>
            <feMergeNode in="blur" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
      </defs>
      <!-- Outer spinning dash ring -->
      <circle cx="60" cy="60" r="54" fill="none" stroke="url(#lubanDiskGrad)" stroke-width="1.5" stroke-dasharray="8 12" opacity="0.4"/>
      <!-- Main disc platter -->
      <circle cx="60" cy="60" r="44" fill="none" stroke="url(#lubanDiskGrad)" stroke-width="3" opacity="0.65"/>
      <circle cx="60" cy="60" r="30" fill="none" stroke="url(#lubanDiskGrad)" stroke-width="1" opacity="0.3"/>
      <!-- Neon central core -->
      <circle cx="60" cy="60" r="18" fill="url(#lubanDiskGrad)" filter="url(#glow)" opacity="0.9"/>
      <!-- Geometric builder notches (Luban style) -->
      <path d="M 60 10 L 60 20 M 60 100 L 60 110 M 10 60 L 20 60 M 100 60 L 110 60" stroke="url(#lubanDiskGrad)" stroke-width="3" stroke-linecap="round"/>
      <!-- Inner core hole -->
      <circle cx="60" cy="60" r="6" fill="#05070f"/>
    </svg>
  </div>
  <h1>钉哥联盟 AI 智盘</h1>
  <p class="subtitle">便携多智能体发行版</p>
  <div class="loader-wrap"><div class="loader-bar"></div></div>
  <p class="status" id="status">正在启动 OpenClaw 引擎...</p>
</div>

<script>
const messages = [
  '正在启动 OpenClaw 引擎...',
  '检查便携式配置文件...',
  '初始化多渠道 AI 网关...',
  '加载 AI 智能体内核...'
];
let i = 0;
setInterval(() => {
  document.getElementById('status').textContent = messages[i % messages.length];
  i++;
}, 2000);

async function checkReady() {
  try {
    if (window.lubanai) {
      const status = await window.lubanai.getGatewayStatus();
      if (status.ready) {
        document.getElementById('status').textContent = '启动就绪，正在加载官方客户端...';
        await window.lubanai.openDashboard();
        return;
      }
    }
  } catch(e) {}
  setTimeout(checkReady, 1000);
}
checkReady();
</script>
</body>
</html>
